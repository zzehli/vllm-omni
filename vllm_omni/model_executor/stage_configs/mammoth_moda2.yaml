# Stage config for running MammothModa2 with full AR→DiT pipeline (text-to-image).
# Stage 0: AR  (multimodal understanding + latent generation)
# Stage 1: DiT (latent → image)
#
# For text/image understanding tasks (text output only), use mammoth_moda2_ar.yaml.

stage_args:
  - stage_id: 0
    runtime:
      devices: "0"
    engine_args:
      model_stage: ar
      max_num_seqs: 100
      model_arch: MammothModa2ForConditionalGeneration
      worker_cls: vllm_omni.worker.gpu_ar_worker.GPUARWorker
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      max_model_len: 8192
      gpu_memory_utilization: 0.5
      enforce_eager: true
      trust_remote_code: true
      engine_output_type: latent
      enable_prefix_caching: false
    final_output: false

  - stage_id: 1
    runtime:
      devices: "0"
    engine_args:
      model_stage: dit
      max_num_seqs: 1
      model_arch: MammothModa2ForConditionalGeneration
      worker_cls: vllm_omni.worker.gpu_generation_worker.GPUGenerationWorker
      scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
      gpu_memory_utilization: 0.3
      enforce_eager: true
      trust_remote_code: true
      engine_output_type: image
      enable_prefix_caching: false
    # Declares extra_args so has_sampling_extra_args is enabled, routing the t2i knobs
    # (text_guidance_scale, cfg_range, num_inference_steps) declared in
    # vllm_omni/model_extras/mammothmodal2_preview.py from extra_body into the DiT
    # forward. Values here are the defaults applied when a request omits a knob.
    default_sampling_params:
      extra_args:
        text_guidance_scale: 9.0
        cfg_range: [0.0, 1.0]
        num_inference_steps: 50
    engine_input_source: [0]
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.mammoth_moda2.ar2dit
    final_output: true
    final_output_type: image
