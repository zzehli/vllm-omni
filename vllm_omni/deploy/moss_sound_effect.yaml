# MOSS-SoundEffect (MossTTSDelayModel, 8B, n_vq=16, 24 kHz)
# HF: OpenMOSS-Team/MOSS-SoundEffect
# Sound effect synthesis — input is a text description of the sound,
# no reference audio required.
# Rate: ~12.5 tokens/second; pass `tokens` to control duration.
async_chunk: true
trust_remote_code: true  # OpenMOSS-Team/MOSS-SoundEffect ships custom modeling code

connectors:
  shm:
    name: SharedMemoryConnector
    extra:
      shm_threshold_bytes: 65536
      codec_streaming: true
      connector_get_sleep_s: 0.01
      connector_get_max_wait_first_chunk: 3000
      connector_get_max_wait: 300
      codec_chunk_frames: 25
      codec_left_context_frames: 0

stages:
  - stage_id: 0
    max_num_seqs: 4
    gpu_memory_utilization: 0.85
    enable_prefix_caching: false
    async_scheduling: true
    max_num_batched_tokens: 4096
    max_model_len: 4096
    devices: "0"
    output_connectors:
      to_stage_1: shm
    default_sampling_params:
      temperature: 1.0
      top_p: 0.95
      top_k: 50
      max_tokens: 4096
      seed: 42
      repetition_penalty: 1.0

  - stage_id: 1
    max_num_seqs: 1
    gpu_memory_utilization: 0.12
    enforce_eager: true
    enable_prefix_caching: false
    async_scheduling: true
    max_num_batched_tokens: 196608
    max_model_len: 196608
    devices: "0"
    input_connectors:
      from_stage_0: shm
    default_sampling_params:
      temperature: 0.0
      top_p: 1.0
      top_k: -1
      max_tokens: 65536
      seed: 42
      repetition_penalty: 1.0
