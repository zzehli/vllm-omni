# HunyuanVideo-1.5 deploy.
#
# Single GPU by default. Increase tensor_parallel_size and devices for multi-GPU TP.
async_chunk: false
trust_remote_code: true
distributed_executor_backend: mp

stages:
  - stage_id: 0
    devices: "0"
    max_num_seqs: 1
    tensor_parallel_size: 1
    enforce_eager: true
    # HunyuanVideo-1.5 peak VRAM is dominated by the single-shot VAE decode of
    # the full video, so tiling the decode is the main memory lever.
    vae_use_tiling: true
    default_sampling_params:
      seed: 42
