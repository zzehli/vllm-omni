- label: "Engine Test"
  agent_pool: mi325_1
  depends_on: amd-build
  mirror_hardwares: [amdproduction]
  grade: Blocking
  commands:
    - export VLLM_WORKER_MULTIPROC_METHOD=spawn
    - |
      timeout 15m bash -c '
              pytest -s -v tests/engine/test_async_omni_engine_abort.py
      '

